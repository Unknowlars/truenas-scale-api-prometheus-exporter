services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Mount the configuration file from the host
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Uncomment the following line if you want persistent Prometheus data
      # - prometheus_data:/prometheus
    # Allow connection to exporter via host network if running separately
    #xtra_hosts:
    #  - "host.docker.internal:host-gateway"
    network_mode: host

# Uncomment the following lines if you want persistent data
# volumes:
#   prometheus_data:
