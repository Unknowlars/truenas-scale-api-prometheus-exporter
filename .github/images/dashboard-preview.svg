<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Grafana dashboard preview placeholder</title>
  <desc id="desc">Placeholder image for the TrueNAS exporter Grafana dashboard screenshot used in the README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="100%" stop-color="#e7eef9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f9ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="70" y="60" width="1460" height="780" rx="28" fill="url(#card)" stroke="#c9d7ee" stroke-width="4"/>
  <rect x="120" y="120" width="400" height="88" rx="16" fill="#0b5cab" opacity="0.12"/>
  <rect x="120" y="240" width="260" height="180" rx="18" fill="#0b5cab" opacity="0.10"/>
  <rect x="410" y="240" width="260" height="180" rx="18" fill="#1f8f6a" opacity="0.10"/>
  <rect x="700" y="240" width="260" height="180" rx="18" fill="#d77c20" opacity="0.10"/>
  <rect x="990" y="240" width="260" height="180" rx="18" fill="#b53a3a" opacity="0.10"/>
  <rect x="1280" y="240" width="200" height="180" rx="18" fill="#5b6f8f" opacity="0.10"/>
  <rect x="120" y="460" width="660" height="300" rx="20" fill="#ffffff" stroke="#d5e0f2" stroke-width="3"/>
  <rect x="820" y="460" width="660" height="300" rx="20" fill="#ffffff" stroke="#d5e0f2" stroke-width="3"/>
  <path d="M170 670 C250 580, 340 720, 430 620 S620 560, 730 680" fill="none" stroke="#0b5cab" stroke-width="10" stroke-linecap="round"/>
  <path d="M870 700 L970 620 L1060 650 L1170 560 L1280 610 L1430 520" fill="none" stroke="#1f8f6a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="970" cy="620" r="8" fill="#1f8f6a"/>
  <circle cx="1060" cy="650" r="8" fill="#1f8f6a"/>
  <circle cx="1170" cy="560" r="8" fill="#1f8f6a"/>
  <circle cx="1280" cy="610" r="8" fill="#1f8f6a"/>
  <circle cx="1430" cy="520" r="8" fill="#1f8f6a"/>
  <text x="120" y="178" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#12345d">Grafana dashboard screenshot goes here</text>
  <text x="120" y="520" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#385073">Drop your exported dashboard preview into .github/images/</text>
  <text x="120" y="570" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#55708f">Suggested files: dashboard-overview.png, dashboard-storage.png, dashboard-disks.png</text>
  <text x="120" y="780" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#6b7f99">Update the image path in README.md when you replace this placeholder.</text>
